name: Bug Report
description: Report a bug in one of our products
labels: ["bug"]
body:
  - type: dropdown
    id: product
    attributes:
      label: Product
      description: Which product is this about?
      options:
        - Anvil API
        - Chain Indexer
        - Wayup
        - Minting/Staking
        - Hodei Wallet
        - Weld
        - Barrow
        - Merkle Tree
        - Vault
        - Hodei Client
        - MetaDraft
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant logs, screenshots, environment details, or other context.
    validations:
      required: false
